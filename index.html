<!doctype html>
<html lang="en">

<head>
  <title>XR Biology Lab | Educational Experience</title>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      /* Darker modern background */
      font-family: sans-serif;
      position: fixed;
      /* Prevents scroll bounce on mobile */
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      touch-action: none;
      /* Disable default browser touch gestures on the canvas */
    }

    #info {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      text-align: center;
      color: #f1f5f9;
      z-index: 100;
      pointer-events: none;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.4);
      font-size: 13px;
      line-height: 1.5;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    #xr-button {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 28px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      z-index: 1000;
      outline: none;
    }

    #xr-button:hover,
    #xr-button:active {
      background: rgba(78, 205, 196, 0.25);
      border-color: #4ecdc4;
      color: #4ecdc4;
      box-shadow: 0 0 20px rgba(78, 205, 196, 0.4), 0 8px 32px rgba(0, 0, 0, 0.3);
      transform: translateX(-50%) scale(1.05);
    }

    #xr-button.disabled {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.3);
      cursor: not-allowed;
      box-shadow: none;
      transform: translateX(-50%);
    }

    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 26, 46, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      transition: opacity 0.6s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-overlay .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(78, 205, 196, 0.2);
      border-top-color: #4ecdc4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-overlay .loading-text {
      color: #f1f5f9;
      font-size: 14px;
      margin-top: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #loading-overlay .loading-detail {
      color: rgba(241, 245, 249, 0.5);
      font-size: 12px;
      margin-top: 6px;
    }

    /* Background model loading toast */
    #bg-loading-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(78, 205, 196, 0.3);
      border-radius: 12px;
      padding: 10px 20px;
      z-index: 1500;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity 0.4s ease, transform 0.4s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    #bg-loading-toast.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(20px);
      pointer-events: none;
    }

    #bg-loading-toast .toast-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(78, 205, 196, 0.3);
      border-top-color: #4ecdc4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    #bg-loading-toast .toast-text {
      color: #f1f5f9;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    #bg-loading-toast .toast-bar {
      width: 80px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    #bg-loading-toast .toast-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ecdc4, #44d1da);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
  <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
        }
      }
    </script>
  <script>
    // Fallback for Meta Immersive Web Emulator compatibility with newer Three.js versions.
    // By undefining XRWebGLBinding, we prevent Three.js from attempting to construct it with emulated
    // XRSessions, forcing it to fall back to the standard WebXR rendering path.
    if (typeof window !== 'undefined') {
      try {
        delete window.XRWebGLBinding;
      } catch (e) {
        window.XRWebGLBinding = undefined;
      }
    }
  </script>
</head>

<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading Lab</div>
    <div class="loading-detail" id="loading-progress">Preparing environment...</div>
  </div>

  <div id="bg-loading-toast" class="hidden">
    <div class="toast-spinner"></div>
    <div class="toast-text" id="bg-loading-text">Loading HD models...</div>
    <div class="toast-bar">
      <div class="toast-bar-fill" id="bg-loading-bar"></div>
    </div>
  </div>

  <div id="info">
    <strong>XR Biology Lab</strong><br />
    <em>Desktop/Mobile:</em> Drag to rotate, Tap/Click models to learn.<br />
  </div>

  <canvas id="controlsCanvas" width="512" height="256" style="display:none;"></canvas>

  <script type="module">
    import { init } from './js/app.js';
    init();
  </script>
</body>

</html>
